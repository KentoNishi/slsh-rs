name: build binaries

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-binaries-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: prepare release
    if: github.repository == 'KentoNishi/slsh-dev'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Prepare prerelease
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="dev-latest"
          title="dev latest"
          notes="Latest dev binary build from ${GITHUB_SHA}."

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            if gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" >/dev/null 2>&1; then
              gh api \
                --method PATCH \
                "repos/${GITHUB_REPOSITORY}/git/refs/tags/${tag}" \
                -f sha="${GITHUB_SHA}" \
                -F force=true >/dev/null
            else
              gh api \
                --method POST \
                "repos/${GITHUB_REPOSITORY}/git/refs" \
                -f ref="refs/tags/${tag}" \
                -f sha="${GITHUB_SHA}" >/dev/null
            fi

            gh release edit "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}" \
              --prerelease \
              --latest=false
          else
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --notes "${notes}" \
              --target "${GITHUB_SHA}" \
              --prerelease \
              --latest=false
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: ${{ matrix.name }}
    if: github.repository == 'KentoNishi/slsh-dev'
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux x64
            runner: ubuntu-latest
            binary: target/release/slsh
            asset: slsh
          - name: windows x64
            runner: windows-latest
            binary: target/release/slsh.exe
            asset: slsh.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.prepare-release.outputs.tag }}" \
            "dist/${{ matrix.asset }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
