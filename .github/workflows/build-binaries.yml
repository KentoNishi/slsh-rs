name: build binaries

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-binaries-${{ github.repository }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: prepare release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Create empty release
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REPOSITORY}" == "KentoNishi/slsh-dev" ]]; then
            tag="dev-latest"
            title="dev latest"
            notes="Latest dev binary build from ${GITHUB_SHA}."
          else
            tag="manual-build-${GITHUB_RUN_NUMBER}"
            title="manual build ${GITHUB_RUN_NUMBER}"
            notes="Manual binary build from ${GITHUB_SHA}."
          fi

          gh release delete "${tag}" --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag 2>/dev/null || true
          gh release create "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${title}" \
            --notes "${notes}" \
            --target "${GITHUB_SHA}" \
            --prerelease \
            --latest=false

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux x64
            runner: ubuntu-latest
            binary: target/release/slsh
            asset: slsh
          - name: windows x64
            runner: windows-latest
            binary: target/release/slsh.exe
            asset: slsh.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build release binary
        run: cargo build --release --locked

      - name: Stage binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.asset }}"

      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${{ needs.prepare-release.outputs.tag }}" \
            "dist/${{ matrix.asset }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  cleanup-failed-release:
    name: cleanup failed release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - build
    if: failure()
    steps:
      - name: Delete partial release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release delete "${{ needs.prepare-release.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --yes \
            --cleanup-tag 2>/dev/null || true
