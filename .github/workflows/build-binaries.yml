name: release binaries

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to. Defaults to the latest prerelease.
        required: false
        type: string
      reuse_assets:
        description: Reuse existing release assets and only update docs/tag.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.repository }}-${{ github.event.release.tag_name || inputs.tag || 'latest-prerelease' }}
  cancel-in-progress: false

jobs:
  resolve-release:
    name: resolve release
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "release" ]; then
            tag="${RELEASE_TAG}"
          elif [ -n "${INPUT_TAG}" ]; then
            tag="${INPUT_TAG}"
          else
            tag="$(
              gh release list --repo "${GITHUB_REPOSITORY}" --limit 100 \
                --json tagName,isPrerelease,isDraft,publishedAt \
                --jq 'map(select(.isPrerelease and (.isDraft | not)))[0].tagName'
            )"

            if [ -z "${tag}" ] || [ "${tag}" = "null" ]; then
              echo "No prerelease found. Pass a release tag manually or create a prerelease first." >&2
              exit 1
            fi
          fi

          gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  build:
    name: ${{ matrix.name }}
    needs: resolve-release
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.reuse_assets }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux x64
            runner: ubuntu-24.04
            asset: slsh-linux-x86_64
            binary: target/release/slsh
          - name: linux arm64
            runner: ubuntu-24.04-arm
            asset: slsh-linux-aarch64
            binary: target/release/slsh
          - name: macos x64
            runner: macos-15-intel
            asset: slsh-macos-x86_64
            binary: target/release/slsh
          - name: macos arm64
            runner: macos-14
            asset: slsh-macos-aarch64
            binary: target/release/slsh
          - name: windows x64
            runner: windows-2025
            asset: slsh-windows-x86_64.exe
            binary: target/release/slsh.exe
          - name: windows arm64
            runner: windows-11-arm
            asset: slsh-windows-aarch64.exe
            binary: target/release/slsh.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -vV

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          cp "${{ matrix.binary }}" "dist/${{ matrix.asset }}"
          if [[ "${{ matrix.asset }}" != *.exe ]]; then
            chmod 0755 "dist/${{ matrix.asset }}"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: publish assets
    needs:
      - resolve-release
      - build
    if: ${{ always() && needs.resolve-release.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout release branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: master

      - name: Download binaries
        if: ${{ needs.build.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Download existing release assets
        if: ${{ needs.build.result == 'skipped' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          mkdir -p artifacts/existing
          gh release download "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --dir artifacts/existing \
            --pattern 'slsh-*'

      - name: Create checksums
        run: |
          set -euo pipefail

          mkdir -p dist
          find artifacts -type f -name 'slsh-*' -exec cp {} dist/ \;
          cd dist
          sha256sum slsh-* > SHA256SUMS
          cat SHA256SUMS

      - name: Update docs and move release tag
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          python3 scripts/update_release_docs.py dist/SHA256SUMS README.md DOCUMENTATION.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet -- README.md DOCUMENTATION.md; then
            git add README.md DOCUMENTATION.md
            git commit -m "release checksums"
            git push origin HEAD:master
          fi

          git tag -f "${RELEASE_TAG}" HEAD
          git push --force origin "refs/tags/${RELEASE_TAG}"

      - name: Upload release assets
        if: ${{ needs.build.result == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.resolve-release.outputs.tag }}
        run: |
          set -euo pipefail

          while IFS= read -r name; do
            case "${name}" in
              *.tar.gz|*.zip)
                gh release delete-asset "${RELEASE_TAG}" "${name}" \
                  --repo "${GITHUB_REPOSITORY}" \
                  --yes
                ;;
            esac
          done < <(
            gh release view "${RELEASE_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '.assets[].name'
          )

          gh release upload "${RELEASE_TAG}" dist/slsh-* dist/SHA256SUMS \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
