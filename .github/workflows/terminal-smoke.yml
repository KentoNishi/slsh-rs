name: terminal smoke

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read

concurrency:
  group: terminal-smoke-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  linux:
    name: linux pty and sshd
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -vV

      - name: Install sshd
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y openssh-server

      - name: Unit tests
        run: cargo test --locked

      - name: Loopback compositor smoke
        run: python3 scripts/smoke_loopback.py

      - name: Fake ssh PTY smoke
        run: python3 scripts/smoke_local_pty.py

      - name: Local sshd smoke
        run: python3 scripts/smoke_local_sshd.py

  macos:
    name: ${{ matrix.name }} pty
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos x64
            runner: macos-15-intel
          - name: macos arm64
            runner: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -vV

      - name: Unit tests
        run: cargo test --locked

      - name: Loopback compositor smoke
        run: python3 scripts/smoke_loopback.py

      - name: Fake ssh PTY smoke
        run: python3 scripts/smoke_local_pty.py

  windows:
    name: ${{ matrix.name }} conpty
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows x64
            runner: windows-2025
          - name: windows arm64
            runner: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc -vV

      - name: Unit tests
        shell: bash
        run: cargo test --locked

      - name: Build release binary
        shell: bash
        run: cargo build --release --locked

      - name: ConPTY harness self-test
        shell: pwsh
        run: ./scripts/smoke_windows_conpty.ps1 -SelfTest

      - name: Ensure Windows Terminal
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $wt = Get-Command wt.exe -ErrorAction SilentlyContinue
          if ($wt) {
            "WT_EXE=$($wt.Source)" >> $env:GITHUB_ENV
            & $wt.Source --version
            exit 0
          }

          $arch = if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") { "arm64" } else { "x64" }
          $release = gh api repos/microsoft/terminal/releases/latest
          $asset = ($release | ConvertFrom-Json).assets |
            Where-Object { $_.name -match "Microsoft\\.WindowsTerminal_.*_${arch}\\.zip$" } |
            Select-Object -First 1
          if (!$asset) {
            throw "missing Windows Terminal portable zip for $arch"
          }

          $zip = Join-Path $env:RUNNER_TEMP $asset.name
          $dir = Join-Path $env:RUNNER_TEMP "WindowsTerminal"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dir -Force

          $exe = Get-ChildItem -Path $dir -Recurse -Filter WindowsTerminal.exe |
            Select-Object -First 1
          if (!$exe) {
            throw "WindowsTerminal.exe missing from portable zip"
          }

          "WT_EXE=$($exe.FullName)" >> $env:GITHUB_ENV
          & $exe.FullName --version

      - name: Windows Terminal PowerShell loopback smoke
        shell: pwsh
        run: ./scripts/smoke_windows_terminal.ps1 -SlshExe target/release/slsh.exe -HostName ignored-host -LoopbackPowerShell
